services:
  api:
    build: .
    container_name: sistema_mensajeria_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:17
    container_name: sistema_mensajeria_db
    restart: always
    environment:
      POSTGRES_DB: sistema_mensajeria_segura
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgresDatos:/var/lib/postgresql/data

volumes:
  postgresDatos:
